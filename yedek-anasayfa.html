<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tarayıcı ve Eklentilere Sitenin Zaten Karanlık Olduğunu Bildirir -->
<meta name="color-scheme" content="dark">
<!-- Dark Reader gibi eklentilerin siteyi değiştirmesini engeller -->
<meta name="darkreader-lock">

<title>Neo1</title>
<style>
    /* --- ATMOSPHERE --- */
    :root {
        --bg-color: #000000;
        --text-color: #e0e0e0;
        --neon-blue: #4F54E3; 
    }

    /* --- MODERN SCROLLBAR (Ana Sayfa İçin) --- */
    ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }
    ::-webkit-scrollbar-track {
        background: var(--bg-color);
    }
    ::-webkit-scrollbar-thumb {
        background: #222222;
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: var(--neon-blue);
    }

    * { 
        margin: 0; padding: 0; box-sizing: border-box; 
        scrollbar-width: thin;
        scrollbar-color: #222222 var(--bg-color);
    }
    
    html, body { 
        height: 100%; width: 100%; 
        background-color: var(--bg-color); 
        color: var(--text-color); 
        font-family: 'Segoe UI', system-ui, sans-serif; 
        overflow: hidden; /* Ana sayfa kaymasını engelle */
        color-scheme: dark;
    }

    /* --- IFRAME WRAPPER (SCROLLBAR GİZLEME HİLESİ) --- */
    .iframe-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; /* İçeriden dışarı taşan (scrollbar) kısmı gizler */
        z-index: 1;
    }

    /* --- IFRAME (SAHNE) --- */
    iframe {
        /* Mobil cihazlarda standart %100 genişlik kullanıyoruz ki kayma olmasın */
        width: 100%; 
        height: 100%; 
        border: none; 
        opacity: 0;
        transition: opacity 1s ease;
        color-scheme: dark;
    }

    /* Sadece masaüstü cihazlarda (768px ve üzeri) scrollbar gizleme hilesini uygula */
    @media (min-width: 768px) {
        iframe {
            width: calc(100% + 20px); 
        }
    }

    /* GÖRÜNÜRLÜK KODUNU GERİ EKLEDİK */
    iframe.visible { opacity: 1; }

    /* --- SNOW CANVAS (PERSISTENT OVERLAY) --- */
    #snowCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999; 
        pointer-events: none; 
    }

    /* --- BACKUP CARD --- */
    .backup-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 50;
        background: #000;
        display: flex; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none; transition: opacity 0.5s;
    }
    .backup-layer.active { opacity: 1; pointer-events: all; }

    .minimal-card {
        text-align: center; border-left: 2px solid var(--neon-blue);
        padding-left: 30px;
    }
    .minimal-card h2 { font-weight: 300; font-size: 2rem; margin-bottom: 10px; color: #fff; }
    .minimal-card p { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
    
    .social-row a {
        color: var(--neon-blue); text-decoration: none; font-size: 0.8rem; 
        margin-right: 15px; text-transform: uppercase; letter-spacing: 1px;
        transition: opacity 0.3s;
    }
    .social-row a:hover { opacity: 0.7; }
</style>
</head>
<body>

    <!-- KAR EFEKTİ -->
    <canvas id="snowCanvas"></canvas>

    <!-- BACKUP SYSTEM -->
    <div class="backup-layer" id="backup">
        <div class="minimal-card">
            <h2>OFFLINE</h2>
            <p>Bağlantı kurulamadı.</p>
            <div class="social-row">
                <a href="https://discord.gg/ZPtPavW7rN" target="_blank">Discord</a>
                <a href="https://www.instagram.com/recep.cl" target="_blank">Instagram</a>
            </div>
        </div>
    </div>

    <!-- IFRAME WRAPPER -->
    <div class="iframe-wrapper">
        <iframe id="siteFrame"></iframe>
    </div>

<script>
    const TARGET_URL = "https://e-z.bio/recepc2";
    const IFRAME = document.getElementById('siteFrame');
    const BACKUP = document.getElementById('backup');

    // --- SNOW EFFECT LOGIC (Optimized) ---
    function initSnow() {
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const particles = [];
        const particleCount = 100;
        const TWO_PI = Math.PI * 2; 

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * -height; 
                this.velocity = Math.random() * 2 + 1; 
                this.size = Math.random() * 2 + 0.5; 
                this.drift = Math.random() * 1 - 0.5; 
                this.opacity = Math.random() * 0.5 + 0.3; 
            }

            update() {
                this.y += this.velocity;
                this.x += this.drift;

                if (this.y > height) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, TWO_PI);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animateSnow() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateSnow);
        }

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }, { passive: true });

        animateSnow();
    }

    // --- CONNECTION CHECK (Optimized) ---
    const checkConnection = async () => {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 3500);
        try {
            await fetch(TARGET_URL, { mode: 'no-cors', signal: controller.signal });
            clearTimeout(timeoutId);
            return true;
        } catch (e) {
            try {
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(TARGET_URL)}&disableCache=true`;
                const res = await fetch(proxy, { signal: controller.signal });
                const data = await res.json();
                return data.status?.http_code === 200;
            } catch { return false; }
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        initSnow(); 
        
        IFRAME.src = TARGET_URL;

        checkConnection().then((isOnline) => {
            if (isOnline) {
                IFRAME.classList.add('visible');
            } else {
                BACKUP.classList.add('active');
                IFRAME.src = "about:blank";
            }
        });
    });
</script>
</body>
</html>
